name: Deploy static site to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare artifact
        run: |
          rm -rf public
          mkdir public
          # copy only the site files (avoid the .github directory)
          shopt -s extglob || true
          cp -r !( .github ) public 2>/dev/null || cp -r . public || true
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: github-pages
          path: public
          retention-days: 1
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v3
